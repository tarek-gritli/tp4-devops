---
- name: Deploy tp4 to Kubernetes
  hosts: local
  vars:
    image_tag: "{{ image_tag | default('latest') }}"
    kubeconfig: "{{ lookup('env', 'KUBECONFIG') }}"
  tasks:
    - name: Set image in deployment manifest
      replace:
        path: "{{ playbook_dir }}/../k8s/deployment.yaml"
        regexp: "IMAGE_TAG"
        replace: "{{ image_tag }}"

    - name: Apply Kubernetes manifests
      shell: kubectl apply -f {{ playbook_dir }}/../k8s/ --validate=false
      environment:
        KUBECONFIG: "{{ kubeconfig }}"

    - name: Wait for deployment rollout
      shell: kubectl rollout status deployment/tp4 -n myapp --timeout=120s
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
